name: Build Web

on:
  push:
    branches: [main, develop]
    paths:
      - "web/**"
      - "libs/**"
      - ".github/workflows/build-web.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "web/**"
      - "libs/**"
      - ".github/workflows/build-web.yml"
  workflow_dispatch:
    inputs:
      logLevel:
        description: "Log level"
        required: true
        default: "warning"
        type: choice
        options:
          - info
          - warning
          - debug
      environment:
        description: "Environment to deploy to"
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: |
            web/package-lock.json
            libs/package-lock.json

      # Install only libs' production dependencies (omit devDependencies to avoid
      # installing react/react-redux into libs/node_modules, which would create
      # a duplicate React instance and cause "useContext null" errors at runtime.
      # Vite reads libs/src directly via the @libs alias — npm run build not needed.
      - name: Install shared library dependencies (prod only)
        working-directory: libs
        run: npm ci --omit=dev

      - name: Install web app dependencies
        working-directory: web
        # npm ci handles the file:../libs dependency automatically from package-lock.json.
        # No need for a separate npm install ../libs.
        run: npm ci

      - name: Build web app
        working-directory: web
        run: npm run build
        env:
          DISCOGS_PERSONAL_ACCESS_TOKEN: ${{ secrets.DISCOGS_PERSONAL_ACCESS_TOKEN }}
          DISCOGS_CONSUMER_KEY: ${{ secrets.DISCOGS_CONSUMER_KEY }}
          DISCOGS_CONSUMER_SECRET: ${{ secrets.DISCOGS_CONSUMER_SECRET }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_SECRET: ${{ secrets.LASTFM_SECRET }}

      - name: Check build output
        working-directory: web
        run: |
          if [ -d "dist" ]; then
            echo "✓ Build output found in dist/"
            ls -lh dist/
          else
            echo "✗ Build output not found"
            exit 1
          fi

      - name: Run tests
        working-directory: web
        run: npx test

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist/
          retention-days: 7
