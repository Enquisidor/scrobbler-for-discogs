name: Deploy Mobile

on:
    workflow_run:
        workflows: ["Build Mobile"]
        branches: [main]
        types: [completed]
    workflow_dispatch:
        inputs:
            run_id:
                description: "Build workflow run ID to deploy from"
                required: true
                type: string
            message:
                description: "Deploy message"
                required: false
                default: "Manual deploy"
                type: string

jobs:
    deploy:
        runs-on: ubuntu-latest
        if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.workflow_run.head_sha || github.sha }}

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22.x

            - name: Install EAS CLI
              run: npm install -g eas-cli

            - name: Verify Expo project
              working-directory: mobile
              run: |
                  if [ -f "app.json" ]; then
                    echo "✓ Expo project detected"
                  fi

            - name: Deploy OTA update (EAS Update)
              working-directory: mobile
              run: eas update --branch production --input-dir dist/ --message "${{ github.event.workflow_run.head_commit.message || github.event.inputs.message }}" --non-interactive
              env:
                  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
